<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Goodshop</title>
    <link rel="icon" type="image/svg+xml" href="../assets/icons/favicon.png">
    <link rel="stylesheet" href="../styles/styles.css">
</head>
<body>
    <div class="page-wrap">
        <div class="site-shell">
            <header>
                <div class="top-bar">
                    <a href="login.html" class="top-link">Login</a>
                    <a href="warenkorb.html" class="top-link">Warenkorb (0)</a>
                    <a href="blog.html" class="social-top"><img src="../assets/icons/social-facebook.png" alt="Facebook" class="social-top-icon"></a>
                    <a href="blog.html" class="social-top"><img src="../assets/icons/social-instagram.png" alt="Instagram" class="social-top-icon"></a>
                    <a href="blog.html" class="social-top"><img src="../assets/icons/social-youtube.png" alt="YouTube" class="social-top-icon"></a>
                </div>
                <nav>
                    <a href="main.html" class="logo">
                        <img src="../assets/images/logo-mockup.png" alt="GoodFlow Logo" class="logo-icon">
                       
                    </a>
                    <ul class="nav-links">
                        <li><a href="shop.html">Shop</a></li>
                        <li><a href="kategorien.html">Kategorien</a></li>
                        <li><a href="nachhaltigkeit.html">Nachhaltigkeit</a></li>
                        <li><a href="ueber-uns.html">Über uns</a></li>
                        <li><a href="blog.html">Blog</a></li>
                    </ul>
                </nav>
            </header>
            <section class="login-section">
                <article class="login-card">
                    <h2>Konto anmelden</h2>
                    <form class="login-form" action="#" method="post">
                        <label for="email">
                            E-Mail
                            <input id="email" name="email" type="email" placeholder="name@example.com" required>
                        </label>
                        <label for="password">
                            Passwort
                            <input id="password" name="password" type="password" placeholder="********" required>
                        </label>
                        <div class="login-actions">
                            <a href="#" class="text-link">Passwort vergessen?</a>
                            <a href="shop.html" class="text-link"><button type="submit" class="btn-cart">Anmelden</button></a>

                            
                        </div>
                    </form>
                </article>
            </section>
        </div>
    </div>
</body>
</html>
